<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Wanderlust Login</title>

    <link rel="stylesheet"
          href="css/style.css">

</head>

<body class="login-page">

    <!-- LOGIN CARD -->

    <div class="login-card">

        <h1 class="login-title">

            Wanderlust Login

        </h1>

        <p class="login-subtitle">

            Login to continue your travel journey ✈️

        </p>

        <!-- FORM -->

        <form id="loginForm">

            <!-- EMAIL -->

            <div class="input-box">

                <label>

                    Enter Email

                </label>

                <input type="email"
                       id="email"
                       placeholder="Enter Email"
                       required>

            </div>

            <!-- PASSWORD -->

            <div class="input-box">

                <label>

                    Enter Password

                </label>

                <input type="password"
                       id="password"
                       placeholder="Enter Password"
                       required>

            </div>

            <!-- BUTTON -->

            <button type="submit"
                    class="login-btn">

                Login

            </button>

        </form>

    </div>

    <!-- LOGIN SCRIPT -->

    <script>

    const loginForm =
        document.getElementById("loginForm");

    loginForm.addEventListener(
        "submit",
        function(e){

        e.preventDefault();

        const email =
            document.getElementById("email").value;

        const password =
            document.getElementById("password").value;

        if(email && password){

            // SAVE USER

            localStorage.setItem(
                "Wanderlust_User",
                email
            );

            // REDIRECT

            window.location.href =
                "index.html";
        }
        else{

            alert(
                "Please enter email and password"
            );
        }

    });

    </script>

</body>

</html>
